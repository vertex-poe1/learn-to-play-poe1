name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    # Observed ~7 min on a clean run; 15 min gives headroom without masking hangs
    timeout-minutes: 15
    env:
      # Disables GPU rendering for QtWebEngine (Chromium).
      # See: https://doc.qt.io/qt-6/qtwebengine-debugging.html
      QTWEBENGINE_DISABLE_GPU: "1"
    environment: ci

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0
        with:
          arch: x64

      # qtwebengine is in the extensions.* namespace on Qt servers; must be added separately below
      - name: Install Qt6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.11.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtpositioning qtwebchannel qtwebengine qtwebsockets'
          aqtsource: "git+https://github.com/miurahr/aqtinstall.git@bbfb1f7c0590b9eb3fa91356e75bb64fb15d3643"
          cache: true
          cache-key-prefix: 'qt-6.11.1-win64-unofficial'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci -V -LE perf

      - name: Restore perf baseline
        id: perf-cache
        uses: actions/cache/restore@v4
        with:
          path: build/ci/perf_baseline.json
          key: perf-ci-windows-never-matches
          restore-keys: perf-ci-windows-

      - name: Generate perf baseline from HEAD~1 (cache miss only)
        if: steps.perf-cache.outputs.cache-hit != 'true'
        run: python3 dev/perf_baseline_prev.py ci

      - name: Perf test
        run: ctest --preset ci --output-on-failure -L perf

      - name: Compare perf vs baseline
        run: python3 dev/perf_compare.py build/ci/perf_baseline.json build/ci/perf_results.json

      - name: Record perf baseline for next run
        if: always()
        run: cmake -E copy build/ci/perf_results.json build/ci/perf_baseline.json
        continue-on-error: true

      - name: Save perf baseline
        if: always()
        uses: actions/cache/save@v4
        with:
          path: build/ci/perf_baseline.json
          key: perf-ci-windows-${{ github.run_id }}-${{ github.run_attempt }}
