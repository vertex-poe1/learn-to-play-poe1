name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0

      - name: Install Qt6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: '6.11.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtpositioning qtwebchannel qtwebengine qtwebsockets'
          aqtsource: "git+https://github.com/miurahr/aqtinstall.git@bbfb1f7c0590b9eb3fa91356e75bb64fb15d3643"
          cache: true
          cache-key-prefix: 'qt-6.11.1-win64-unofficial'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: cmake --preset ci-release

      - name: Build
        run: cmake --build --preset ci-release

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $version = $matches[1]
          } else {
            $version = "dev-$(git rev-parse --short HEAD)"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Prepare deployment
        shell: pwsh
        run: |
          $build = "build\ci-release"
          $src = "$build\src"
          $deploy = "$build\deploy"
          New-Item -ItemType Directory -Force -Path $deploy

          Copy-Item "$src\l2p-poe.exe" $deploy

          # Copy vcpkg / FetchContent runtime DLLs that cmake placed next to the exe.
          Get-ChildItem "$src\*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $deploy

          # qt6keychain is built via FetchContent and its DLL lands in _deps/qtkeychain-build/,
          # not $src. Find it anywhere under the build tree (excluding $deploy to avoid a
          # self-copy error) and copy it into the deploy dir ourselves.
          $keychain = Get-ChildItem "$build" -Recurse -Filter "qt6keychain*.dll" `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notlike "*\deploy\*" } |
            Select-Object -First 1
          if (-not $keychain) { throw "qt6keychain.dll not found under $build" }
          Write-Host "Found: $($keychain.FullName)"
          Copy-Item $keychain.FullName -Destination $deploy -Force

          # Deploy Qt runtime dependencies.
          # NOTE: windeployqt matches DLLs by filename: anything named "Qt6*"/"qt6*" is
          # assumed to be an official Qt module living in $QT_ROOT_DIR\bin. qt6keychain.dll
          # is a third-party FetchContent lib that happens to use the "qt6" prefix, so
          # windeployqt prepends $QT_ROOT_DIR\bin to its lookup path, fails to open it there,
          # and aborts with exit code 1. --ignore-library-errors does NOT suppress this
          # particular failure in Qt 6.11's windeployqt.
          #
          # Fix: stage qt6keychain.dll where windeployqt expects to find it ($QT_ROOT_DIR\bin)
          # before running it. windeployqt then resolves it like any Qt module and scans its
          # dependencies normally. We remove it afterward to leave the Qt install untouched.
          $qtBin = "$env:QT_ROOT_DIR\bin"
          $stagedKeychain = "$qtBin\$($keychain.Name)"
          $stagedKeychainPreexisted = Test-Path $stagedKeychain
          if (-not $stagedKeychainPreexisted) {
            Copy-Item $keychain.FullName -Destination $stagedKeychain -Force
          }
          try {
            & "$qtBin\windeployqt.exe" `
              --release `
              --compiler-runtime `
              --no-translations `
              --dir $deploy `
              "$deploy\l2p-poe.exe"
            if ($LASTEXITCODE -ne 0) { throw "windeployqt failed with exit code $LASTEXITCODE" }
          }
          finally {
            if (-not $stagedKeychainPreexisted) {
              Remove-Item $stagedKeychain -Force -ErrorAction SilentlyContinue
            }
          }

          # Ensure VC redistributable is present (windeployqt --compiler-runtime should
          # copy it, but fall back to downloading if it doesn't)
          if (-not (Test-Path "$deploy\vc_redist.x64.exe")) {
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
              -OutFile "$deploy\vc_redist.x64.exe"
          }

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "build\ci-release\deploy\*" `
            -DestinationPath "build\ci-release\l2p-poe-$version.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: l2p-poe-${{ steps.version.outputs.version }}
          path: build\ci-release\l2p-poe-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          files: build\ci-release\l2p-poe-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
